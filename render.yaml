services:
  - type: web
    name: nsfw-detection-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        fromPort: true
    healthCheckPath: /api/healthz
